name: Deploy Slides

on:
  push:
    branches:
      - main
      - master

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Convert Markdown to HTML (Multi-project)
        run: |
          mkdir dist

          if [ -d "images"]; then
            cp -r images dist/
          fi

          for dir in */; do
            if [ "$dir" != "dist/" ] && [ "$dir" != ".github/" ] && [ "$dir" != "images/" ]; then
              dirname=$(basename "$dir")
              md_file=$(ls "$dirname"/*.md | head -n 1)
              
              if [ -n "$md_file" ]; then
                mkdir -p "dist/$dirname"
                # ここで変換
                npx @marp-team/marp-cli@latest "$md_file" -o "dist/$dirname/index.html" --theme-set style.css
              fi
            fi
          done

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages